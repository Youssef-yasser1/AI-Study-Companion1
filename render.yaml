services:
  - type: web
    name: ai-study-companion
    runtime: python
    buildCommand: pip install -r requirements_render.txt && python -c "import nltk; nltk.download('punkt'); nltk.download('punkt_tab'); nltk.download('stopwords'); nltk.download('averaged_perceptron_tagger'); nltk.download('averaged_perceptron_tagger_eng')"
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    envVars:
      - key: HF_TOKEN
        sync: false  # Set this manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11"
